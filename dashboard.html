<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Roz Tr - Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to bottom, #ffffff, #e5e5e5);
  margin: 0;
}

.header {
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  color: #555;
}

.card {
  background: white;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 15px #ccc;
}

.title {
  font-size: 14px;
  color: #888;
}

.value {
  font-size: 22px;
  font-weight: bold;
  margin-top: 5px;
}

.button {
  display: block;
  margin: 10px 15px;
  padding: 15px;
  text-align: center;
  background: #888;
  color: white;
  border-radius: 10px;
  text-decoration: none;
}

.button:hover {
  background: #666;
}

.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px;
  box-shadow: 0 -2px 10px #ccc;
}

.nav-item {
  text-align: center;
  color: #555;
}
</style>
</head>

<body>

<div class="header">Roz Tr</div>

<div class="card">
  <div class="title">👤 الاسم</div>
  <div class="value" id="name"></div>
</div>

<div class="card">
  <div class="title">🆔 رقم الحساب</div>
  <div class="value" id="account"></div>
</div>

<div class="card">
  <div class="title">💰 الرصيد</div>
  <div class="value" id="points">0</div>
</div>

<a href="#" class="button">📋 المهام</a>
<a href="#" class="button">💰 شحن الرصيد</a>
<a href="#" class="button">💸 سحب</a>

<div class="bottom-nav">
  <div class="nav-item">🏠</div>
  <div class="nav-item">📋</div>
  <div class="nav-item">💰</div>
  <div class="nav-item">👤</div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://ipslfmrolkquacrbvbxl.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlwc2xmbXJvbGtxdWFjcmJ2YnhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjEwMTMsImV4cCI6MjA5MDAzNzAxM30.1I6jlttiXn_flKCbXbmXVyZrjnlLOoYqYqqX3rsM4wk"
);

// جلب المستخدم
let user = JSON.parse(localStorage.getItem("user"));

if (!user) {
  window.location.href = "index.html";
}

// عرض البيانات
document.getElementById("name").innerText = user.name;
document.getElementById("account").innerText = user.account_id;
document.getElementById("points").innerText = user.points;

// تحديث الرصيد من قاعدة البيانات
async function loadData() {
  const { data } = await supabase
    .from("users")
    .select("*")
    .eq("id", user.id)
    .single();

  if (data) {
    document.getElementById("points").innerText = data.points;
  }
}

loadData();
</script>

</body>
</html>
