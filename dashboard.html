<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roz Tr</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: linear-gradient(to bottom, #fff, #e5e5e5);
}

.header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  font-weight: bold;
}

.card {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 0 10px #ccc;
}

.value {
  font-size: 20px;
  font-weight: bold;
}

.button {
  display: block;
  margin: 10px;
  padding: 12px;
  text-align: center;
  background: linear-gradient(45deg,#aaa,#666);
  color: white;
  border-radius: 10px;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="header">Roz Tr</div>

<div class="card">
👤 <div class="value" id="name"></div>
</div>

<div class="card">
🆔 <div class="value" id="account"></div>
</div>

<div class="card">
💰 <div class="value" id="points"></div>
</div>

<a href="tasks.html" class="button">📋 المهام</a>
<a href="deposit.html" class="button">💰 شحن</a>
<a href="withdraw.html" class="button">💸 سحب</a>
<a href="notifications.html" class="button">🔔 الإشعارات</a>

<script>
const supabase = window.supabase.createClient(
"https://ipslfmrolkquacrbvbxl.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

let user = JSON.parse(localStorage.getItem("user"));
if(!user) window.location.href="index.html";

document.getElementById("name").innerText=user.name;
document.getElementById("account").innerText=user.account_id;

async function load(){
let {data}=await supabase.from("users").select("*").eq("id",user.id).single();
document.getElementById("points").innerText=data.points;
}
load();
</script>

</body>
</html>
