<body>

<div class="card">🕓 4 <button onclick="doTask(4)">إكمال</button></div>
<div class="card">🕖 7 <button onclick="doTask(7)">إكمال</button></div>
<div class="card">🕘 VIP <button onclick="doTask(9)">إكمال</button></div>

<script>
const supabase = window.supabase.createClient(
"https://ipslfmrolkquacrbvbxl.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlwc2xmbXJvbGtxdWFjcmJ2YnhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjEwMTMsImV4cCI6MjA5MDAzNzAxM30.1I6jlttiXn_flKCbXbmXVyZrjnlLOoYqYqqX3rsM4wk"
);

let user = JSON.parse(localStorage.getItem("user"));
if (!user) location="index.html";

async function doTask(t){
  try{
    let {data:u} = await supabase.from("users").select("*").eq("id",user.id).single();
    if(!u) return;

    if(t==9 && u.points < 1000){
      alert("❌ تحتاج 1000 نقطة");
      return;
    }

    let profit = (u.points/15)*1.2;

    await supabase.from("users").update({points:u.points+profit}).eq("id",user.id);

    alert("🎉 ربحت " + profit.toFixed(2));
  }catch(e){
    console.log(e);
    alert("❌ خطأ");
  }
}
</script>
