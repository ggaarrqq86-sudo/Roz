// تحميل طلبات الشحن
async function loadDeposits() {
  const { data } = await supabase
    .from("deposits")
    .select("*")
    .eq("status", "pending");

  let html = "";

  for (let d of data) {
    html += `
      <div class="card">
        💰 ${d.amount} نقطة
        <br>
        <button onclick="approveDeposit('${d.id}', '${d.user_id}', ${d.amount})">قبول</button>
      </div>
    `;
  }

  document.getElementById("deposits").innerHTML = html;
}

// تحميل طلبات السحب
async function loadWithdrawals() {
  const { data } = await supabase
    .from("withdrawals")
    .select("*")
    .eq("status", "pending");

  let html = "";

  for (let w of data) {
    html += `
      <div class="card">
        💸 ${w.amount} → ${w.final_amount}
        <br>
        <button onclick="approveWithdraw('${w.id}')">تم الدفع</button>
      </div>
    `;
  }

  document.getElementById("withdrawals").innerHTML = html;
}

// قبول الشحن
async function approveDeposit(id, user_id, amount) {

  // تحديث الحالة
  await supabase.from("deposits")
    .update({ status: "approved" })
    .eq("id", id);

  // إضافة الرصيد
  const { data } = await supabase
    .from("users")
    .select("*")
    .eq("id", user_id)
    .single();

  let newPoints = parseFloat(data.points) + amount;

  await supabase
    .from("users")
    .update({ points: newPoints })
    .eq("id", user_id);

  // إشعار
  await supabase.from("notifications").insert([{
    user_id: user_id,
    message: "✅ تم إضافة " + amount + " نقطة"
  }]);

  alert("تم الشحن");
  loadDeposits();
}

// قبول السحب
async function approveWithdraw(id) {

  await supabase.from("withdrawals")
    .update({ status: "paid" })
    .eq("id", id);

  alert("تم السحب");
  loadWithdrawals();
}
