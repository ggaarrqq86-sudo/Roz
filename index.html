<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roz Tr</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: Arial;
  background: linear-gradient(to bottom,#ffffff,#e0e0e0);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.box {
  background:white;
  padding:20px;
  width:90%;
  max-width:350px;
  border-radius:15px;
  box-shadow:0 0 10px #ccc;
}

h2 {
  text-align:center;
}

input {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:10px;
  background:#666;
  color:white;
  border:none;
  border-radius:8px;
}

#msg {
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h2>Roz Tr</h2>

<h3>🔐 إنشاء حساب</h3>
<input id="name" placeholder="الاسم">
<input id="email" placeholder="البريد الإلكتروني">
<input id="pass" type="password" placeholder="كلمة المرور">
<button onclick="register()">إنشاء حساب</button>

<hr>

<h3>🔓 تسجيل دخول</h3>
<input id="lemail" placeholder="البريد الإلكتروني">
<input id="lpass" type="password" placeholder="كلمة المرور">
<button onclick="login()">دخول</button>

<p id="msg"></p>

</div>

<script>
const supabase = window.supabase.createClient(
"https://ipslfmrolkquacrbvbxl.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlwc2xmbXJvbGtxdWFjcmJ2YnhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjEwMTMsImV4cCI6MjA5MDAzNzAxM30.1I6jlttiXn_flKCbXbmXVyZrjnlLOoYqYqqX3rsM4wk"
);

function msg(t){
  document.getElementById("msg").innerText = t;
}

// ✅ إنشاء حساب
async function register(){
  let name = document.getElementById("name").value.trim();
  let email = document.getElementById("email").value.trim();
  let pass = document.getElementById("pass").value.trim();

  if(!name || !email || !pass){
    msg("❌ عبّي كل الحقول");
    return;
  }

  let { error } = await supabase.from("users").insert([{
    name: name,
    email: email,
    password: pass,
    points: 0
  }]);

  if(error){
    console.log(error);
    msg("❌ " + error.message);
  }else{
    msg("✅ تم إنشاء الحساب");
  }
}

// ✅ تسجيل دخول
async function login(){
  let email = document.getElementById("lemail").value.trim();
  let pass = document.getElementById("lpass").value.trim();

  if(!email || !pass){
    msg("❌ عبّي البيانات");
    return;
  }

  let { data, error } = await supabase
    .from("users")
    .select("*")
    .eq("email", email)
    .eq("password", pass)
    .single();

  if(error || !data){
    console.log(error);
    msg("❌ معلومات خاطئة");
  }else{
    localStorage.setItem("user", JSON.stringify(data));
    msg("✅ تم تسجيل الدخول");

    setTimeout(()=>{
      window.location.href = "dashboard.html";
    }, 1000);
  }
}
</script>

</body>
</html>
