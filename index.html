<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roz Tr</title>

<!-- ✅ مكتبة شغالة 100% -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial;
  background:#eee;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box{
  background:#fff;
  padding:20px;
  width:90%;
  max-width:350px;
  border-radius:10px;
}
input,button{
  width:100%;
  padding:10px;
  margin:5px 0;
}
button{
  background:#444;
  color:#fff;
  border:none;
}
</style>
</head>

<body>

<div class="box">
<h2>Roz Tr</h2>

<input id="name" placeholder="الاسم">
<input id="email" placeholder="البريد">
<input id="pass" type="password" placeholder="كلمة المرور">

<button onclick="register()">إنشاء حساب</button>

<hr>

<input id="lemail" placeholder="البريد">
<input id="lpass" type="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>

<p id="msg"></p>
</div>

<script>

// ✅ تأكيد أن الكود اشتغل
console.log("JS شغال");

const supabase = window.supabase.createClient(
"https://ipslfmrolkquacrbvbxl.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlwc2xmbXJvbGtxdWFjcmJ2YnhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjEwMTMsImV4cCI6MjA5MDAzNzAxM30.1I6jlttiXn_flKCbXbmXVyZrjnlLOoYqYqqX3rsM4wk"
);

function msg(t){
  document.getElementById("msg").innerText = t;
}

// 🔐 تسجيل
async function register(){
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  if(!name || !email || !pass){
    msg("❌ عبّي كل الحقول");
    return;
  }

  let {error} = await supabase.from("users").insert([{
    name:name,
    email:email,
    password:pass,
    points:0
  }]);

  if(error){
    msg("❌ " + error.message);
  }else{
    msg("✅ تم التسجيل");
  }
}

// 🔓 دخول
async function login(){
  let email = document.getElementById("lemail").value;
  let pass = document.getElementById("lpass").value;

  let {data,error} = await supabase
    .from("users")
    .select("*")
    .eq("email",email)
    .eq("password",pass)
    .single();

  if(error || !data){
    msg("❌ معلومات غلط");
  }else{
    localStorage.setItem("user", JSON.stringify(data));
    msg("✅ تم الدخول");

    setTimeout(()=>{
      window.location="dashboard.html";
    },1000);
  }
}

</script>

</body>
</html>
